<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espanja AI-Treeni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="bg-white shadow-2xl rounded-3xl overflow-hidden">
            <div class="bg-red-600 p-6 text-white flex justify-between items-center">
                <h1 class="text-2xl font-bold italic text-white">🇪🇸 Aprendemos Español!</h1>
                <span class="text-xs bg-red-800 px-2 py-1 rounded">Budget Mode: ON</span>
            </div>

            <div class="p-6">
                <p class="text-gray-600 mb-4 font-medium">Mitä haluat lukea tänään?</p>
                <div class="grid grid-cols-3 gap-3 mb-8">
                    <button onclick="generate('uutinen')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Uutiset</button>
                    <button onclick="generate('lasten tarina')" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">Sarjakuvat</button>
                    <button onclick="generate('lyhyt novelli')" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition">Kirjat</button>
                </div>

                <div id="output" class="min-h-[300px] border-2 border-dashed border-gray-200 rounded-2xl p-6 bg-slate-50 text-gray-800 leading-relaxed">
                    <p class="text-gray-400 text-center mt-20">Valitse aihe ylhäältä aloittaaksesi...</p>
                </div>
            </div>

            <div class="bg-gray-50 p-6 border-t border-gray-100">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">OpenRouter API-avain (sk-or-v1...)</label>
                <input type="password" id="apiKey" 
                       placeholder="Liitä avaimesi tähän" 
                       class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm">
                <p class="text-[10px] text-gray-400 mt-2 italic text-white">* Avain tallentuu vain selaimeesi, ei palvelimelle.</p>
            </div>
        </div>
        <p class="text-center text-gray-400 text-xs mt-6 text-white">Gemini 2.0 Flash @ OpenRouter | Kulutus n. 0.0001€ per haku</p>
    </div>

    <script>
        // Lataa avain muistista jos se on tallennettu
        document.getElementById('apiKey').value = localStorage.getItem('espanja_key') || '';

        async function generate(type) {
            const keyField = document.getElementById('apiKey');
            const key = keyField.value.trim();
            const output = document.getElementById('output');

            if (!key) {
                alert("Ole hyvä ja syötä API-avain alalaidan kenttään!");
                return;
            }

            // Tallennetaan avain selaimen muistiin vastaisuuden varalle
            localStorage.setItem('espanja_key', key);

            output.innerHTML = `<div class="loading text-center mt-20 text-blue-600 font-bold text-white">Haetaan tuoretta espanjankielistä sisältöä...</div>`;

            const prompt = `Act as a Spanish language tutor. 
            1. Write a 5-8 sentence ${type} in Spanish.
            2. Translate it to Finnish.
            3. List 5 key vocabulary words (Spanish - Finnish).
            4. Ask 2 simple questions in Spanish about the text.
            Keep the formatting clean using bold text for headers.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${key}`,
                        "HTTP-Referer": window.location.href,
                        "X-Title": "Espanja Treeni App"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [{ "role": "user", "content": prompt }],
                        "temperature": 0.7
                    })
                });

                const data = await response.json();

                if (data.error) {
                    output.innerHTML = `
                        <div class="bg-red-50 p-4 rounded-lg border border-red-200 text-red-700">
                            <strong>Virhe OpenRouterissa:</strong><br>
                            ${data.error.message || 'Tuntematon virhe'}
                            <br><br>
                            <em>Vinkki: Tarkista onko sinulla saldoa (Credits) OpenRouterissa.</em>
                        </div>`;
                } else {
                    const text = data.choices[0].message.content;
                    // Muunnetaan Markdown-tyyliset rivinvaihdot HTML-muotoon
                    output.innerHTML = `<div class="whitespace-pre-wrap">${text}</div>`;
                }

            } catch (err) {
                output.innerHTML = `<div class="text-red-600 font-bold">Yhteysvirhe: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
