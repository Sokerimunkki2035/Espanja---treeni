<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kieli-AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .highlight { background-color: #fef08a; border-radius: 4px; color: black; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 font-sans flex flex-col h-screen overflow-hidden">

    <div class="p-4 bg-slate-900 border-b border-slate-800 shadow-xl">
        <div class="flex justify-between items-center mb-2">
            <div>
                <h1 class="text-xl font-black text-yellow-500 italic uppercase tracking-tighter">🇪🇸 Aprendemos!</h1>
                <div class="text-[10px] font-mono text-slate-500">🔥 Putki: <span id="statStreak">0</span> | ✅ Valmis: <span id="statTotal">0</span></div>
            </div>
            <div class="flex gap-2">
                <select id="targetLang" class="bg-slate-800 text-white p-2 rounded-xl text-xs border border-slate-700 outline-none">
                    <option value="es">Espanja</option>
                    <option value="ja">Japani</option>
                    <option value="it">Italia</option>
                </select>
                <button onclick="document.getElementById('apiSection').classList.toggle('hidden')" class="bg-slate-700 p-2 rounded-xl text-xs">⚙️</button>
            </div>
        </div>
        <div id="apiSection" class="hidden mt-2">
            <input type="password" id="apiInput" placeholder="Liitä API-avain (sk-or-v1...)" class="w-full bg-black p-3 rounded-xl text-xs text-white border border-yellow-600 outline-none">
            <p class="text-[9px] text-slate-500 mt-1 uppercase font-bold text-center italic">Avain tallentuu selaimeen</p>
        </div>
    </div>

    <div class="flex-grow flex flex-col lg:flex-row overflow-hidden">
        
        <div class="flex-grow flex flex-col p-3 overflow-y-auto custom-scroll border-r border-slate-900">
            <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col min-h-full">
                <div class="grid grid-cols-3 gap-1 p-2 bg-slate-100 border-b text-center">
                    <button onclick="run('news')" class="bg-blue-600 text-white font-bold py-3 rounded-2xl text-[12px]">Uutiset</button>
                    <button onclick="run('comic')" class="bg-emerald-600 text-white font-bold py-3 rounded-2xl text-[12px]">Sarjis</button>
                    <button onclick="run('dialogue')" class="bg-orange-500 text-white font-bold py-3 rounded-2xl text-[12px]">Treeni</button>
                </div>

                <div id="display" class="p-5 text-slate-900 flex-grow">
                    <div class="text-center py-10 text-slate-300">
                        <p class="text-6xl mb-2">📖</p>
                        <p class="font-bold italic text-slate-400">Valitse tehtävä ylhäältä.</p>
                    </div>
                </div>

                <div id="audioBox" class="hidden p-4 bg-slate-50 border-t flex flex-col gap-2">
                    <div class="flex gap-2">
                        <button onclick="speak()" class="flex-1 bg-slate-900 text-white py-3 rounded-2xl font-black text-sm">🔊 KUUNTELE</button>
                        <button id="micBtn" onclick="startSpeech()" class="flex-1 bg-red-600 text-white py-3 rounded-2xl font-black text-sm">🎤 LUE</button>
                    </div>
                    <p id="speechStatus" class="text-[10px] text-center font-bold text-slate-400 uppercase tracking-widest">Paina mikrofonía</p>
                </div>
            </div>
        </div>

        <div class="lg:w-80 bg-slate-900/30 p-3 flex flex-col gap-3 overflow-y-auto custom-scroll">
            <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800 shadow-xl">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 italic">🔍 Resurssihaku</h2>
                <div id="resourceBox" class="space-y-2 text-[11px] text-slate-400">
                    Hae sisältöä nähdäksesi linkkejä...
                </div>
            </div>

            <div class="bg-black rounded-2xl p-3 border border-slate-800 flex flex-col h-64 shadow-inner">
                <div id="chatHistory" class="flex-grow overflow-y-auto text-[10px] text-slate-400 space-y-2 mb-2 custom-scroll">
                    <p><b>AI:</b> Hola! Miten voin auttaa?</p>
                </div>
                <div class="flex gap-2 bg-slate-900 p-1 rounded-xl border border-slate-800">
                    <input id="chatInput" type="text" placeholder="..." class="flex-grow bg-transparent text-white text-xs p-1 outline-none">
                    <button onclick="chatSearch()" class="bg-yellow-500 text-black font-bold px-3 py-1 rounded-lg text-xs">➜</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const langs = { es: { v: 'es-ES', n: 'Spanish' }, ja: { v: 'ja-JP', n: 'Japanese' }, it: { v: 'it-IT', n: 'Italian' } };
        document.getElementById('apiInput').value = localStorage.getItem('user_key_v6') || '';
        refreshStats();

        function refreshStats() {
            const s = JSON.parse(localStorage.getItem('user_stats_v6') || '{"total":0,"streak":0,"last":""}');
            document.getElementById('statTotal').innerText = s.total;
            document.getElementById('statStreak').innerText = s.streak;
        }

        async function run(type) {
            const key = document.getElementById('apiInput').value.trim();
            if (!key) {
                document.getElementById('apiSection').classList.remove('hidden');
                return alert("Syötä API-avain ensin!");
            }
            localStorage.setItem('user_key_v6', key);
            
            const lang = document.getElementById('targetLang').value;
            const display = document.getElementById('display');
            display.innerHTML = `<div class="loading text-center py-10 text-slate-400 font-bold italic uppercase tracking-widest text-xs">Generoidaan...</div>`;
            document.getElementById('audioBox').classList.add('hidden');

            const prompt = `Task: Create a ${type} for a student learning ${langs[lang].n}. 
            Format exactly (no markdown):
            IMAGE: [one english noun]
            TITLE: [title]
            ES: [story in ${langs[lang].n}]
            FI: [translation]
            VOC: [3 words - Finnish]`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key.replace(/[^a-zA-Z0-9-]/g, '') },
                    body: JSON.stringify({ "model": "google/gemini-2.0-flash-001", "messages": [{ "role": "user", "content": prompt }] })
                });
                const data = await response.json();
                const raw = data.choices[0].message.content;

                const getVal = (tag) => {
                    const match = raw.match(new RegExp(`${tag}:(.*?)(?=\n[A-Z]{2,}:|$)`, 's'));
                    return match ? match[1].trim() : '';
                };

                const imgWord = getVal('IMAGE').replace(/[\[\]]/g, '') || 'culture';
                const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(imgWord)}?width=800&height=400&nologo=true&seed=${Math.random()}`;

                display.innerHTML = `
                    <img src="${imgUrl}" class="w-full h-40 object-cover rounded-2xl mb-4 shadow-md border border-slate-100">
                    <h2 class="text-xl font-black text-slate-900 mb-3">${getVal('TITLE')}</h2>
                    <div class="grid grid-cols-1 gap-3 mb-4">
                        <div id="mainText" class="p-4 bg-yellow-50 rounded-xl border-l-4 border-yellow-400 italic text-slate-800 text-md">${getVal('ES').replace(/\n/g, '<br>')}</div>
                        <div class="p-4 bg-slate-50 rounded-xl border-l-4 border-slate-200 text-slate-600 text-xs">${getVal('FI').replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="text-[10px] font-mono text-slate-400 uppercase bg-slate-50 p-2 rounded-lg border border-slate-100"><b>Voc:</b> ${getVal('VOC').replace(/\n/g, ' | ')}</div>
                `;
                document.getElementById('audioBox').classList.remove('hidden');
                updateStats();
                fetchResources(getVal('TITLE'), key);
            } catch (err) { display.innerHTML = `<div class="p-6 text-red-500 font-bold">Virhe. Tarkista avain.</div>`; }
        }

        async function fetchResources(topic, key) {
            const resBox = document.getElementById('resourceBox');
            resBox.innerHTML = '<div class="loading">Etsitään linkkejä...</div>';
            const prompt = `Etsi 3 linkkiä (Amazon, YouTube, Webtoon tms.) joista löytyy espanjan sarjakuvia aiheesta: ${topic}. Vastaa vain listana.`;
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key.replace(/[^a-zA-Z0-9-]/g, '') },
                    body: JSON.stringify({ "model": "google/gemini-2.0-flash-001", "messages": [{ "role": "user", "content": prompt }] })
                });
                const data = await response.json();
                resBox.innerHTML = data.choices[0].message.content.split('\n').map(i => `<div class="bg-slate-800 p-2 rounded-xl text-[10px] mb-1">🔗 ${i}</div>`).join('');
            } catch (e) { resBox.innerHTML = 'Ei linkkejä.'; }
        }

        function speak() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(document.getElementById('mainText').innerText);
            u.lang = langs[document.getElementById('targetLang').value].v;
            u.rate = 0.7;
            window.speechSynthesis.speak(u);
        }

        function startSpeech() {
            const status = document.getElementById('speechStatus');
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = langs[document.getElementById('targetLang').value].v;
            recognition.start();
            status.innerText = "🔴 KUUNTELEN...";
            recognition.onresult = (e) => {
                status.innerHTML = `Sanoit: <span class="text-blue-500 italic">"${e.results[0][0].transcript}"</span><br><b>ERINOMAISTA!</b>`;
            };
        }

        function updateStats() {
            let s = JSON.parse(localStorage.getItem('user_stats_v6') || '{"total":0,"streak":0,"last":""}');
            const today = new Date().toDateString();
            s.total++;
            if (s.last !== today) { s.streak++; s.last = today; }
            localStorage.setItem('user_stats_v6', JSON.stringify(s));
            refreshStats();
        }

        async function chatSearch() {
            const inp = document.getElementById('chatInput');
            const history = document.getElementById('chatHistory');
            const key = document.getElementById('apiInput').value.trim();
            if(!inp.value || !key) return;
            const userMsg = inp.value;
            history.innerHTML += `<div class="text-white"><b>Mina:</b> ${userMsg}</div>`;
            inp.value = '';
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key.replace(/[^a-zA-Z0-9-]/g, '') },
                    body: JSON.stringify({ "model": "google/gemini-2.0-flash-001", "messages": [{ "role": "user", "content": userMsg }] })
                });
                const data = await response.json();
                history.innerHTML += `<div class="bg-slate-900 p-2 rounded-lg italic"><b>AI:</b> ${data.choices[0].message.content}</div>`;
                history.scrollTop = history.scrollHeight;
            } catch (e) { history.innerHTML += `<div class="text-red-500">Virhe.</div>`; }
        }
    </script>
</body>
</html>
