    </div>

    <script>
        // Päivämäärä ja käyttökerrat
        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('fi-FI');
        let usageCount = parseInt(localStorage.getItem('usageCount')) || 0;
        document.getElementById('usageCount').textContent = usageCount;

        function incrementUsage() {
            usageCount++;
            localStorage.setItem('usageCount', usageCount);
            document.getElementById('usageCount').textContent = usageCount;
        }

        // Kieliasetukset
        const langs = {
            es: { v: 'es-ES', n: 'Spanish' },
            ja: { v: 'ja-JP', n: 'Japanese' },
            it: { v: 'it-IT', n: 'Italian' }
        };

        // Lataa tallennettu API-avain
        document.getElementById('apiInput').value = localStorage.getItem('user_key_v10') || '';

        // Treeni-toiminto
        function startTreeni() {
            const display = document.getElementById('display');
            display.innerHTML = `
                <h2 class="text-lg font-black text-slate-900 mb-3 border-b-2 border-yellow-400 pb-1 uppercase tracking-tight">ÄÄNTÄMISHARJOITUS</h2>
                <div class="p-4 bg-yellow-50 rounded-xl font-normal text-slate-800 text-lg leading-relaxed mb-6 space-y-4 shadow-sm">
                    <p>Lue seuraava lause ääneen:</p>
                    <p id="speechText" class="font-bold text-xl">Hola Ana, ¿qué tal? Te veo muy concentrada.</p>
                </div>
                <div id="speechFeedback" class="mt-4 p-2 bg-slate-100 rounded text-[10px] text-slate-500"></div>
            `;
            incrementUsage();
        }

        // Puheentunnistus
        function startSpeechRecognition() {
            const feedbackDiv = document.getElementById('speechFeedback');
            feedbackDiv.innerHTML = '<div class="loading">Kuuntelen...</div>';

            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            recognition.start();

            recognition.onresult = async (event) => {
                const userSpeech = event.results[0][0].transcript;
                const key = document.getElementById('apiInput').value.trim();

                feedbackDiv.innerHTML = `<div>Sinä sanoit: <b>${userSpeech}</b></div>`;

                try {
                    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${key}`
                        },
                        body: JSON.stringify({
                            "model": "google/gemini-2.0-flash-001",
                            "messages": [{
                                "role": "user",
                                "content": `Arvostele seuraava espanjan kielen ääntämiseni oikeellisuus ja anna palautetta: "${userSpeech}". Oikea lause oli: "Hola Ana, ¿qué tal? Te veo muy concentrada."`
                            }]
                        })
                    });

                    const data = await response.json();
                    feedbackDiv.innerHTML += `<div class="mt-2"><b>Palaute:</b> ${data.choices[0].message.content}</div>`;

                } catch (error) {
                    feedbackDiv.innerHTML += `<div class="mt-2 text-red-500">Virhe palautteen hakemisessa.</div>`;
                }
            };
        }

        // Pääfunktio sisällön hakemiselle
        async function run(type) {
            const key = document.getElementById('apiInput').value.trim();
            if (!key) return alert("Aseta API-avain rattaasta!");

            localStorage.setItem('user_key_v10', key);
            incrementUsage();

            const display = document.getElementById('display');
            display.innerHTML = `<div class="loading text-center my-auto text-slate-400 font-bold uppercase text-[10px]">Haetaan sisältöä...</div>`;

            const prompt = `Luo ${type} opiskelijalle kielellä ${langs[document.getElementById('targetLang').value].n}.
            Käytä selkeitä kappaleita. ÄLÄ KÄYTÄ KUVIA TAI LIHAVOINTIA TEKSTISSÄ.
            TITLE: [otsikko]
            STORY: [kappaleittain jäsennelty teksti]
            FI: [suomennos suomeksi]
            VOC: [3 tärkeää sanaa]`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [{ "role": "user", "content": prompt }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || "API-virhe");
                }

                const data = await response.json();
                const raw = data.choices[0].message.content;

                const getVal = (tag) => {
                    const match = raw.match(new RegExp(`${tag}:(.*?)(?=\n[A-Z]{2,}:|$)`, 's'));
                    return match ? match[1].trim() : '';
                };

                const mainContent = getVal('STORY') || getVal('TARGET');

                display.innerHTML = `
                    <h2 class="text-lg font-black text-slate-900 mb-3 border-b-2 border-yellow-400 pb-1 uppercase tracking-tight">${getVal('TITLE')}</h2>
                    <div id="mainText" class="p-4 bg-yellow-50 rounded-xl font-normal text-slate-800 text-lg leading-relaxed mb-6 space-y-4 shadow-sm">
                        ${mainContent.split('\n').filter(p => p.trim()).map(p => `<div>${p}</div>`).join('')}
                    </div>
                    <div class="p-4 bg-slate-50 rounded-lg text-slate-500 text-[11px] mb-4 border border-slate-100 space-y-2">
                        <b class="text-[9px] uppercase tracking-widest opacity-70">Suomennos:</b>
                        <div class="font-normal italic">${getVal('FI').split('\n').filter(p => p.trim()).map(p => `<div>${p}</div>`).join('')}</div>
                    </div>
                    <div class="mt-auto p-2 bg-slate-100 rounded text-[9px] font-mono text-slate-500 uppercase border border-slate-200"><b>Sanasto:</b> ${getVal('VOC')}</div>
                `;

                fetchResources(getVal('TITLE'), key);

            } catch (err) {
                console.error("Virhe:", err);
                display.innerHTML = `
                    <div class="p-4 text-red-500 text-xs">
                        <p>Virhe: ${err.message}</p>
                        <p>Tarkista:</p>
                        <ul class="list-disc pl-4">
                            <li>API-avain</li>
                            <li>Verkkoyhteys</li>
                            <li>OpenRouterin tili</li>
                        </ul>
                    </div>
                `;
            }
        }

        // Puhetoiminnot
        function speak() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(document.getElementById('mainText')?.innerText || "Valitse ensin sisältö.");
            u.lang = langs[document.getElementById('targetLang').value].v;
            u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        // Haetaan lisälinkkejä
        async function fetchResources(topic, key) {
            const resBox = document.getElementById('resourceBox');
            resBox.innerHTML = 'Haetaan linkkejä...';
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [{ "role": "user", "content": `Listaa 3 linkkiä aiheeseen: ${topic}. Vain lista.` }]
                    })
                });

                if (!response.ok) {
                    throw new Error("Linkkien haku epäonnistui");
                }

                const data = await response.json();
                resBox.innerHTML = data.choices[0].message.content.split('\n').map(i => `<div class="mb-1 border-b border-slate-700 pb-1">🔗 ${i}</div>`).join('');

            } catch (e) {
                resBox.innerHTML = 'Linkkejä ei löytynyt.';
            }
        }

        // AI-chat
        async function chatSearch() {
            const inp = document.getElementById('chatInput');
            const history = document.getElementById('chatHistory');
            const key = document.getElementById('apiInput').value.trim();

            if (!inp.value || !key) return;

            history.innerHTML += `<div class="text-white text-right font-normal italic">"${inp.value}"</div>`;
            const msg = inp.value;
            inp.value = '';

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [{ "role": "user", "content": msg }]
                    })
                });

                if (!response.ok) {
                    throw new Error("Chat-virhe");
                }

                const data = await response.json();
                history.innerHTML += `<div class="bg-slate-800 p-1 rounded font-normal">AI: ${data.choices[0].message.content}</div>`;
                history.scrollTop = history.scrollHeight;

            } catch (e) {
                history.innerHTML += `<div>Virhe: ${e.message}</div>`;
            }
        }
    </script>
