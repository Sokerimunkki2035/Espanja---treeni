<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spanish Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-5">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold text-red-600 mb-4">🇪🇸 Hola! Mitä treenataan?</h1>
        
        <div class="flex gap-2 mb-6">
            <button onclick="getExercise('uutiset')" class="bg-blue-500 text-white px-4 py-2 rounded">Uutiset</button>
            <button onclick="getExercise('sarjakuva')" class="bg-green-500 text-white px-4 py-2 rounded">Sarjakuvat</button>
            <button onclick="getExercise('kirja')" class="bg-orange-500 text-white px-4 py-2 rounded">Kirjallisuus</button>
        </div>

        <div id="content" class="prose lg:prose-xl text-gray-800">
            <p>Valitse aihe ylhäältä aloittaaksesi...</p>
        </div>

        <hr class="my-6">
        <div class="text-sm text-gray-500">
            <p>Asetukset (Tallenna API-avaimesi selaimen muistiin):</p>
            <input type="password" id="apiKey" placeholder="OpenRouter tai Gemini API Key" class="border p-1 w-full mt-1">
        </div>
    </div>

    <script>
        async function getExercise(type) {
            const key = document.getElementById('apiKey').value;
            if (!key) return alert("Lisää API-avain asetuksiin!");
            
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = "Ladataan espanjankielistä sisältöä...";

            const prompt = `Act as a Spanish teacher. Provide a short ${type} snippet in Spanish appropriate for a learner. 
            After the text, provide a vocabulary list of 5 difficult words in Finnish and 3 comprehension questions.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-flash-1.5", 
                        "messages": [{"role": "user", "content": prompt}]
                    })
                });
                const data = await response.json();
                contentDiv.innerHTML = data.choices[0].message.content.replace(/\n/g, '<br>');
            } catch (e) {
                contentDiv.innerHTML = "Virhe ladattaessa. Tarkista API-avain ja nettiyhteys.";
            }
        }
    </script>
</body>
</html>
