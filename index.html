<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kieli-Treeni AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .highlight { background-color: #fef08a; padding: 2px; border-radius: 4px; color: black; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 font-sans selection:bg-yellow-500 selection:text-black">

    <div class="max-w-3xl mx-auto py-6 px-4">
        <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-2xl mb-6 flex justify-between items-center">
            <div>
                <h1 id="headerTitle" class="text-xl font-black text-yellow-500 uppercase tracking-tighter italic">🇪🇸 Aprendemos Español!</h1>
                <div class="flex gap-4 mt-1 text-[10px] font-mono text-slate-500 uppercase tracking-widest">
                    <span>🔥 Putki: <b id="statStreak" class="text-green-500">0</b> pv</span>
                    <span>✅ Valmis: <b id="statTotal" class="text-blue-500">0</b> kpl</span>
                </div>
            </div>
            <select id="targetLang" onchange="switchLang()" class="bg-slate-800 text-white p-2 rounded-xl text-xs border border-slate-700 outline-none">
                <option value="es">Espanja</option>
                <option value="ja">Japani</option>
                <option value="it">Italia</option>
            </select>
        </div>

        <div class="bg-white rounded-[2rem] overflow-hidden shadow-2xl border-b-8 border-slate-900">
            <div class="grid grid-cols-3 gap-1 p-2 bg-slate-100 border-b border-slate-200">
                <button onclick="run('uutinen')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-md">Uutiset</button>
                <button onclick="run('sarjakuva')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-md">Sarjakuva</button>
                <button onclick="run('keskustelu')" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-md">Chatti</button>
            </div>

            <div id="display" class="p-6 text-slate-900 min-h-[400px]">
                <div class="text-center py-20 text-slate-300">
                    <p class="text-8xl mb-4">📚</p>
                    <p class="font-bold text-slate-400">Paina nappia aloittaaksesi!</p>
                </div>
            </div>

            <div id="audioBox" class="hidden p-6 bg-slate-50 border-t border-slate-100 flex flex-col items-center gap-4">
                <div class="w-full max-w-xs space-y-2">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase italic">
                        <span>Hitaasti</span>
                        <span>Nopeasti</span>
                    </div>
                    <input type="range" id="speechRate" min="0.3" max="1.0" step="0.1" value="0.7" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-900">
                </div>
                <button onclick="speak()" class="bg-slate-950 text-white w-full max-w-xs py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-black transition-all flex items-center justify-center gap-3">
                    🔊 LUE ÄÄNEEN
                </button>
            </div>
        </div>

        <div class="mt-6">
            <details class="group">
                <summary class="list-none cursor-pointer text-center text-slate-600 text-[10px] font-bold uppercase tracking-widest group-open:mb-4">⚙️ Asetukset</summary>
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                    <input type="password" id="apiInput" placeholder="Syötä API-avain (sk-or-v1...)" class="w-full bg-black border border-slate-800 p-3 rounded-xl text-white text-sm outline-none focus:border-yellow-600 transition-colors">
                </div>
            </details>
        </div>
    </div>

    <script>
        const langs = {
            es: { title: '🇪🇸 Aprendemos Español!', voice: 'es-ES', name: 'Spanish' },
            ja: { title: '🇯🇵 日本語を学びましょう!', voice: 'ja-JP', name: 'Japanese' },
            it: { title: '🇮🇹 Impariamo l’Italiano!', voice: 'it-IT', name: 'Italian' }
        };

        document.getElementById('apiInput').value = localStorage.getItem('user_key') || '';
        stats();

        function switchLang() {
            const l = document.getElementById('targetLang').value;
            document.getElementById('headerTitle').innerText = langs[l].title;
            document.getElementById('display').innerHTML = '<div class="text-center py-20 text-slate-300">Kieli vaihdettu.</div>';
            document.getElementById('audioBox').classList.add('hidden');
        }

        function stats() {
            const s = JSON.parse(localStorage.getItem('user_stats') || '{"total":0,"streak":0,"last":""}');
            document.getElementById('statTotal').innerText = s.total;
            document.getElementById('statStreak').innerText = s.streak;
        }

        async function run(type) {
            const key = document.getElementById('apiInput').value.trim();
            const lang = document.getElementById('targetLang').value;
            if (!key) return alert("API-AVAIN PUUTTUU!");
            localStorage.setItem('user_key', key);

            const display = document.getElementById('display');
            display.innerHTML = `<div class="loading text-center py-20 font-black text-slate-400 italic">LUODAAN SISÄLTÖÄ...</div>`;
            document.getElementById('audioBox').classList.add('hidden');

            // Käytetään erittäin tarkkaa ohjeistusta, jotta tekoäly ei sekoita koodia
            const prompt = `Create a ${type} for a ${langs[lang].name} student. Output as plain text with these markers:
            [KEYWORD] one simple English noun for an image
            [TITLE] title here
            [TEXT] ${langs[lang].name} text
            [FI] Finnish translation
            [WORDS] 5 vocabulary words (${langs[lang].name} - Finnish)`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [{ "role": "user", "content": prompt }]
                    })
                });

                if (!response.ok) throw new Error("Palvelin vastasi virheellä");
                const data = await response.json();
                const raw = data.choices[0].message.content;

                // Parsitaan vastaus turvallisesti
                const getPart = (tag) => {
                    const regex = new RegExp(`\\[${tag}\\](.*?)(?=\\[|$)`, 's');
                    const match = raw.match(regex);
                    return match ? match[1].trim() : '';
                };

                const keyword = getPart('KEYWORD') || 'book';
                const imgUrl = `https://image.pollinations.ai/prompt/${keyword}%20illustration%20minimalist?width=800&height=400&nologo=true`;

                display.innerHTML = `
                    <img src="${imgUrl}" class="w-full h-48 object-cover rounded-2xl mb-6 shadow-lg border border-slate-100">
                    <h2 class="text-2xl font-black text-slate-900 mb-4">${getPart('TITLE')}</h2>
                    <div id="mainText" class="p-5 bg-yellow-50 rounded-2xl border-l-8 border-yellow-400 text-lg italic mb-6 shadow-inner text-slate-800">
                        ${getPart('TEXT').replace(/\n/g, '<br>')}
                    </div>
                    <div class="space-y-4">
                        <div>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Suomennos</span>
                            <p class="text-slate-600 leading-relaxed">${getPart('FI').replace(/\n/g, '<br>')}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sanasto</span>
                            <p class="text-sm font-mono mt-2 text-slate-700">${getPart('WORDS').replace(/\n/g, '<br>')}</p>
                        </div>
                    </div>
                `;

                document.getElementById('audioBox').classList.remove('hidden');
                
                // Stat päivitys
                let s = JSON.parse(localStorage.getItem('user_stats') || '{"total":0,"streak":0,"last":""}');
                const today = new Date().toDateString();
                s.total++;
                if (s.last !== today) { s.streak++; s.last = today; }
                localStorage.setItem('user_stats', JSON.stringify(s));
                stats();

            } catch (err) {
                display.innerHTML = `<div class="p-6 bg-red-50 text-red-600 rounded-2xl border border-red-100 font-bold">❌ VIRHE: ${err.message}</div>`;
            }
        }

        function speak() {
            const text = document.getElementById('mainText').innerText;
            const lang = document.getElementById('targetLang').value;
            const rate = document.getElementById('speechRate').value;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = langs[lang].voice;
            u.rate = rate;
            u.onstart = () => document.getElementById('mainText').classList.add('highlight');
            u.onend = () => document.getElementById('mainText').classList.remove('highlight');
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
