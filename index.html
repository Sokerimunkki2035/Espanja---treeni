<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kieli-Treeni Pro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .highlight { background-color: yellow; transition: background 0.3s; }
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 font-sans">

    <div class="max-w-4xl mx-auto py-8 px-4">
        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl mb-6">
            <div class="flex justify-between items-center flex-wrap gap-4">
                <div>
                    <h1 id="headerTitle" class="text-2xl font-bold text-yellow-400 italic">🇪🇸 Aprendemos Español!</h1>
                    <div class="flex gap-4 mt-2 text-xs text-slate-400 font-mono">
                        <span>STREAK: <b id="statStreak" class="text-green-400">0</b> PÄIVÄÄ</span>
                        <span>TEHTY: <b id="statTotal" class="text-blue-400">0</b> KPL</span>
                    </div>
                </div>
                <select id="targetLang" onchange="switchLang()" class="bg-slate-700 p-2 rounded-xl outline-none border border-slate-600 text-sm">
                    <option value="es">Espanja (Español)</option>
                    <option value="ja">Japani (日本語)</option>
                    <option value="it">Italia (Italiano)</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="p-4 bg-slate-50 border-b border-slate-200 grid grid-cols-3 gap-2">
                <button onclick="run('uutinen')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition shadow-lg">📰 Uutiset</button>
                <button onclick="run('sarjakuva')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl transition shadow-lg">🎨 Sarjakuva</button>
                <button onclick="run('keskustelu')" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl transition shadow-lg">💬 Chatti</button>
            </div>

            <div id="display" class="p-8 text-slate-800 min-h-[450px]">
                <div class="text-center py-20 text-slate-400">
                    <p class="text-7xl mb-6">🎯</p>
                    <h2 class="text-xl font-bold text-slate-600">Valmis aloittamaan?</h2>
                    <p>Valitse aihe ylhäältä. Varmista että API-avain on alla olevissa asetuksissa.</p>
                </div>
            </div>

            <div id="audioControls" class="hidden p-6 bg-slate-100 border-t flex flex-col items-center gap-4">
                <div class="flex items-center gap-4 w-full max-w-xs">
                    <span class="text-xs font-bold text-slate-500">Hitaasti</span>
                    <input type="range" id="speechRate" min="0.3" max="1.0" step="0.1" value="0.7" class="flex-grow accent-slate-800">
                    <span class="text-xs font-bold text-slate-500">Normaali</span>
                </div>
                <button onclick="startReading()" class="bg-slate-900 text-white px-10 py-3 rounded-full font-black hover:scale-105 transition shadow-xl flex items-center gap-2">
                    <span>🔊 LUE ÄÄNEEN</span>
                </button>
            </div>
        </div>

        <div class="mt-8 bg-slate-800 p-6 rounded-3xl border border-slate-700">
            <details>
                <summary class="cursor-pointer text-slate-400 font-bold text-sm tracking-widest uppercase flex items-center gap-2">
                    ⚙️ Asetukset & API-Avain
                </summary>
                <div class="mt-4 space-y-4">
                    <input type="password" id="apiInput" placeholder="Liitä sk-or-v1... avain täähän" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 outline-none focus:border-yellow-400 transition text-white">
                    <p class="text-[10px] text-slate-500 italic">Vinkki: Sivu tallentaa avaimen vain omaan selaimeesi (LocalStorage). Älä jaa avainta muille.</p>
                </div>
            </details>
        </div>
    </div>

    <script>
        const config = {
            es: { title: '🇪🇸 Aprendemos Español!', voice: 'es-ES', name: 'Spanish' },
            ja: { title: '🇯🇵 日本語を学びましょう!', voice: 'ja-JP', name: 'Japanese' },
            it: { title: '🇮🇹 Impariamo l’Italiano!', voice: 'it-IT', name: 'Italian' }
        };

        // Alustus
        document.getElementById('apiInput').value = localStorage.getItem('my_ai_key') || '';
        refreshStats();

        function switchLang() {
            const lang = document.getElementById('targetLang').value;
            document.getElementById('headerTitle').innerText = config[lang].title;
            document.getElementById('display').innerHTML = `<p class="text-center text-slate-400 mt-20 italic font-mono">Kieli vaihdettu: ${config[lang].name}</p>`;
            document.getElementById('audioControls').classList.add('hidden');
        }

        function refreshStats() {
            const s = JSON.parse(localStorage.getItem('my_stats') || '{"total":0,"streak":0,"last":""}');
            document.getElementById('statTotal').innerText = s.total;
            document.getElementById('statStreak').innerText = s.streak;
        }

        function updateStats() {
            let s = JSON.parse(localStorage.getItem('my_stats') || '{"total":0,"streak":0,"last":""}');
            const today = new Date().toDateString();
            s.total++;
            if (s.last !== today) {
                s.streak++;
                s.last = today;
            }
            localStorage.setItem('my_stats', JSON.stringify(s));
            refreshStats();
        }

        async function run(type) {
            const key = document.getElementById('apiInput').value.trim();
            const lang = document.getElementById('targetLang').value;
            if (!key) return alert("API-AVAIN PUUTTUU!");

            localStorage.setItem('my_ai_key', key);
            const display = document.getElementById('display');
            display.innerHTML = `<div class="loading text-center mt-20 text-blue-600 font-black text-2xl font-mono uppercase">AI LUO SISÄLTÖÄ...</div>`;
            document.getElementById('audioControls').classList.add('hidden');

            const prompt = `Act as a language teacher. Create a ${type} for a Finnish student learning ${config[lang].name}.
            1. Keyword: [One English noun for a picture]
            2. Title in ${config[lang].name}
            3. Main text in ${config[lang].name} (split into sentences)
            4. Finnish translation
            5. Vocabulary (5 words: ${config[lang].name} - Finnish)
            Return strictly HTML format using <h3> and <p> tags. Don't use markdown code blocks.`;

            try {
                // TÄRKEÄÄ: Headers pidetään puhtaana erikoismerkeistä (ISO-8859-1 yhteensopiva)
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + key,
                        "X-Title": "KielitreeniApp" 
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [{ "role": "user", "content": prompt }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let raw = data.choices[0].message.content;
                
                // Kuvan haku avainsanalla
                const keyWordMatch = raw.match(/Keyword:\s*(\w+)/i);
                const word = keyWordMatch ? keyWordMatch[1] : 'culture';
                const imgUrl = `https://source.unsplash.com/800x450/?${word},${config[lang].name}`;
                
                // Puhdistetaan teksti ja paloitellaan se lauseiksi "maalausta" varten
                let clean = raw.replace(/Keyword:.*?\n/gi, '');
                
                display.innerHTML = `
                    <img src="${imgUrl}" class="w-full h-48 object-cover rounded-3xl mb-8 shadow-inner" onerror="this.style.display='none'">
                    <div id="textToRead" class="prose prose-lg max-w-none">
                        ${clean}
                    </div>
                `;
                
                document.getElementById('audioControls').classList.remove('hidden');
                updateStats();

            } catch (err) {
                display.innerHTML = `<div class="p-6 bg-red-100 text-red-700 rounded-3xl border-2 border-red-200">
                    <h3 class="font-black">❌ VIRHE YHTEYDESSÄ</h3>
                    <p class="text-sm mt-2">${err.message}</p>
                </div>`;
            }
        }

        function startReading() {
            const container = document.getElementById('textToRead');
            const text = container.innerText;
            const lang = document.getElementById('targetLang').value;
            const rate = document.getElementById('speechRate').value;

            // Pysäytetään vanha puhe
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = config[lang].voice;
            utterance.rate = rate;

            // Yksinkertainen "maalaus" (korostaa koko tekstialueen lukemisen ajaksi)
            utterance.onstart = () => container.classList.add('highlight');
            utterance.onend = () => container.classList.remove('highlight');

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
