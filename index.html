<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kieli-Treeni Pro AI</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        .highlight { background-color: #fef08a; transition: background 0.3s; padding: 5px; border-radius: 5px; color: black; }
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 font-sans">

    <div class="max-w-4xl mx-auto py-8 px-4">
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl mb-6">
            <div class="flex justify-between items-center flex-wrap gap-4">
                <div>
                    <h1 id="headerTitle" class="text-2xl font-bold text-yellow-500 italic">🇪🇸 Aprendemos Español!</h1>
                    <div class="flex gap-4 mt-2 text-xs text-slate-500 font-mono">
                        <span>🔥 PUTKI: <b id="statStreak" class="text-green-500">0</b> PÄIVÄÄ</span>
                        <span>✅ TEHTY: <b id="statTotal" class="text-blue-500">0</b> KPL</span>
                    </div>
                </div>
                <select id="targetLang" onchange="switchLang()" class="bg-slate-800 p-2 rounded-xl outline-none border border-slate-700 text-sm text-white">
                    <option value="es">Espanja (Español)</option>
                    <option value="ja">Japani (日本語)</option>
                    <option value="it">Italia (Italiano)</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-4 border-slate-900">
            <div class="p-4 bg-slate-100 border-b border-slate-200 grid grid-cols-3 gap-2">
                <button onclick="run('uutinen')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition shadow-lg">📰 Uutiset</button>
                <button onclick="run('sarjakuva')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl transition shadow-lg">🎨 Sarjakuva</button>
                <button onclick="run('keskustelu')" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl transition shadow-lg">💬 Chatti</button>
            </div>

            <div id="display" class="p-8 text-slate-900 min-h-[450px]">
                <div class="text-center py-20 text-slate-400">
                    <p class="text-7xl mb-6">✨</p>
                    <h2 class="text-xl font-bold text-slate-600">¡Hola! Oletko valmis?</h2>
                    <p>Valitse aihe ylhäältä. Kuva ja teksti latautuvat tähän.</p>
                </div>
            </div>

            <div id="audioControls" class="hidden p-6 bg-slate-50 border-t flex flex-col items-center gap-4">
                <div class="flex items-center gap-4 w-full max-w-xs">
                    <span class="text-xs font-bold text-slate-400 italic">Hitaasti</span>
                    <input type="range" id="speechRate" min="0.3" max="1.0" step="0.1" value="0.7" class="flex-grow accent-slate-900">
                    <span class="text-xs font-bold text-slate-400 italic">Nopeasti</span>
                </div>
                <button onclick="startReading()" class="bg-slate-950 text-white px-10 py-4 rounded-full font-black hover:scale-105 transition shadow-2xl flex items-center gap-3">
                    <span class="text-xl">🔊</span> LUE ÄÄNEEN
                </button>
            </div>
        </div>

        <div class="mt-8 bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-inner">
            <details>
                <summary class="cursor-pointer text-slate-500 font-bold text-sm tracking-widest uppercase flex items-center gap-2">
                    ⚙️ ASETUKSET
                </summary>
                <div class="mt-4">
                    <input type="password" id="apiInput" placeholder="Liitä OpenRouter API-avain täähän" class="w-full p-4 bg-slate-950 rounded-2xl border border-slate-800 outline-none focus:border-yellow-600 transition text-white">
                </div>
            </details>
        </div>
    </div>

    <script>
        const config = {
            es: { title: '🇪🇸 Aprendemos Español!', voice: 'es-ES', name: 'Spanish' },
            ja: { title: '🇯🇵 日本語を学びましょう!', voice: 'ja-JP', name: 'Japanese' },
            it: { title: '🇮🇹 Impariamo l’Italiano!', voice: 'it-IT', name: 'Italian' }
        };

        document.getElementById('apiInput').value = localStorage.getItem('my_ai_key') || '';
        refreshStats();

        function switchLang() {
            const lang = document.getElementById('targetLang').value;
            document.getElementById('headerTitle').innerText = config[lang].title;
            document.getElementById('display').innerHTML = `<p class="text-center text-slate-400 mt-20 italic font-mono">Kieli vaihdettu: ${config[lang].name}</p>`;
            document.getElementById('audioControls').classList.add('hidden');
        }

        function refreshStats() {
            const s = JSON.parse(localStorage.getItem('my_stats') || '{"total":0,"streak":0,"last":""}');
            document.getElementById('statTotal').innerText = s.total;
            document.getElementById('statStreak').innerText = s.streak;
        }

        function updateStats() {
            let s = JSON.parse(localStorage.getItem('my_stats') || '{"total":0,"streak":0,"last":""}');
            const today = new Date().toDateString();
            s.total++;
            if (s.last !== today) {
                s.streak++;
                s.last = today;
            }
            localStorage.setItem('my_stats', JSON.stringify(s));
            refreshStats();
        }

        async function run(type) {
            const key = document.getElementById('apiInput').value.trim();
            const lang = document.getElementById('targetLang').value;
            if (!key) return alert("API-AVAIN PUUTTUU!");

            localStorage.setItem('my_ai_key', key);
            const display = document.getElementById('display');
            display.innerHTML = `<div class="loading text-center mt-20 text-blue-600 font-black text-2xl font-mono uppercase italic">AI LUO TARINAA...</div>`;
            document.getElementById('audioControls').classList.add('hidden');

            const prompt = `Act as a language teacher. Create a ${type} for a student learning ${config[lang].name}.
            Format:
            [Keyword: one simple English noun for a picture]
            [Title: title here]
            [Content: text here]
            [Translation: Finnish translation here]
            [Vocabulary: 5 words in ${config[lang].name} - Finnish]
            Important: Do not use markdown code blocks like \`\`\`html. Return plain text with the tags.`;

            try {
                const response = await fetch("[https://openrouter.ai/api/v1/chat/completions](https://openrouter.ai/api/v1/chat/completions)", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + key,
                        "X-Title": "KielitreeniV3"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [{ "role": "user", "content": prompt }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let raw = data.choices[0].message.content;
                
                // Parempi kuvan ja tekstin erottelu
                const keyMatch = raw.match(/\[Keyword:\s*(.*?)\]/i);
                const titleMatch = raw.match(/\[Title:\s*(.*?)\]/i);
                const contentMatch = raw.match(/\[Content:\s*(.*?)\]/is);
                const transMatch = raw.match(/\[Translation:\s*(.*?)\]/is);
                const vocabMatch = raw.match(/\[Vocabulary:\s*(.*?)\]/is);

                const keyword = keyMatch ? keyMatch[1] : 'nature';
                const imgUrl = `https://image.pollinations.ai/prompt/${keyword}%20style%20photography%20high%20quality?width=800&height=450&nologo=true`;

                display.innerHTML = `
                    <div class="mb-6 rounded-3xl overflow-hidden shadow-xl border-4 border-slate-100">
                        <img src="${imgUrl}" class="w-full h-64 object-cover" alt="illustration">
                    </div>
                    <div id="textToRead" class="prose prose-lg max-w-none text-slate-900">
                        <h2 class="text-2xl font-black text-blue-900 mb-4">${titleMatch ? titleMatch[1] : ''}</h2>
                        <div class="p-4 bg-yellow-50 rounded-2xl border-l-8 border-yellow-400 mb-6 italic">
                            ${contentMatch ? contentMatch[1].replace(/\n/g, '<br>') : ''}
                        </div>
                        <h4 class="font-bold text-slate-500 uppercase text-xs tracking-widest mb-2">Suomennos</h4>
                        <p class="text-slate-600 mb-6">${transMatch ? transMatch[1].replace(/\n/g, '<br>') : ''}</p>
                        <h4 class="font-bold text-slate-500 uppercase text-xs tracking-widest mb-2">Sanasto</h4>
                        <div class="bg-slate-100 p-4 rounded-2xl font-mono text-sm">
                            ${vocabMatch ? vocabMatch[1].replace(/\n/g, '<br>') : ''}
                        </div>
                    </div>
                `;
                
                document.getElementById('audioControls').classList.remove('hidden');
                updateStats();

            } catch (err) {
                display.innerHTML = `<div class="p-6 bg-red-100 text-red-700 rounded-3xl border-2 border-red-200">❌ VIRHE: ${err.message}</div>`;
            }
        }

        function startReading() {
            const container = document.getElementById('textToRead');
            // Luetaan vain se osa, joka on kohdekielellä (Content)
            const contentPart = container.querySelector('.bg-yellow-50').innerText;
            const lang = document.getElementById('targetLang').value;
            const rate = document.getElementById('speechRate').value;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(contentPart);
            utterance.lang = config[lang].voice;
            utterance.rate = rate;

            utterance.onstart = () => container.querySelector('.bg-yellow-50').classList.add('highlight');
            utterance.onend = () => container.querySelector('.bg-yellow-50').classList.remove('highlight');

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
