<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kieli-Treeni AI 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .comic-box { border: 3px solid #1e293b; border-radius: 1rem; overflow: hidden; background: white; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen font-sans text-slate-100">

    <div class="max-w-4xl mx-auto py-8 px-4">
        <div class="flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700">
            <div>
                <h1 id="langTitle" class="text-xl font-bold text-yellow-400">🇪🇸 Aprendemos Español!</h1>
                <div class="text-xs text-slate-400 flex gap-4 mt-1">
                    <span>🔥 Putki: <b id="streak">0</b> päivää</span>
                    <span>✅ Tehty: <b id="totalTasks">0</b> kpl</span>
                </div>
            </div>
            <select id="langSelect" onchange="updateUI()" class="bg-slate-700 text-white p-2 rounded-lg text-sm outline-none border border-slate-600">
                <option value="es">Espanja</option>
                <option value="ja">Japani</option>
                <option value="it">Italia</option>
            </select>
        </div>

        <div class="bg-white text-slate-900 rounded-3xl shadow-2xl overflow-hidden shadow-blue-500/20">
            <div class="p-6 bg-slate-50 border-b border-slate-200 grid grid-cols-3 gap-3">
                <button onclick="generate('uutinen')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition text-sm">📰 Uutiset</button>
                <button onclick="generate('sarjakuva')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition text-sm">🎨 Sarjakuva</button>
                <button onclick="generate('keskustelu')" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition text-sm">💬 Chatti</button>
            </div>

            <div id="output" class="p-6 min-h-[400px]">
                <div class="text-center text-slate-400 mt-20">
                    <p class="text-6xl mb-4">🚀</p>
                    <p class="text-lg font-medium">Valitse harjoitus ylhäältä aloittaaksesi!</p>
                    <p class="text-sm">Varmista, että API-avain on syötetty alle.</p>
                </div>
            </div>

            <div id="controls" class="hidden p-4 bg-slate-100 border-t flex justify-center gap-4">
                <button onclick="speakText()" class="flex items-center gap-2 bg-slate-800 text-white px-6 py-2 rounded-full hover:bg-black transition font-bold">
                    🔊 Lue ääneen
                </button>
            </div>
        </div>

        <div class="mt-8 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg">
            <details>
                <summary class="cursor-pointer text-slate-400 text-sm font-bold uppercase tracking-widest">⚙️ Asetukset & API Avain</summary>
                <div class="mt-4">
                    <input type="password" id="apiKey" placeholder="Liitä OpenRouter-avain täähän..." class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-blue-500 transition">
                    <p class="text-[10px] text-slate-500 mt-2 italic">Avain tallentuu vain selaimeesi. Tätä koodia saa antaa vain ystäville henkilökohtaisesti.</p>
                </div>
            </details>
        </div>
    </div>

    <script>
        const langs = {
            es: { title: '🇪🇸 Aprendemos Español!', name: 'Spanish', speech: 'es-ES' },
            ja: { title: '🇯🇵 日本語を学びましょう!', name: 'Japanese', speech: 'ja-JP' },
            it: { title: '🇮🇹 Impariamo l’Italiano!', name: 'Italian', speech: 'it-IT' }
        };

        // Alustus
        document.getElementById('apiKey').value = localStorage.getItem('user_api_key') || '';
        updateStats();

        function updateUI() {
            const l = document.getElementById('langSelect').value;
            document.getElementById('langTitle').innerText = langs[l].title;
            document.getElementById('output').innerHTML = '<p class="text-center mt-20 text-slate-400 italic">Kieli vaihdettu. Valitse harjoitus.</p>';
            document.getElementById('controls').classList.add('hidden');
        }

        function updateStats() {
            const stats = JSON.parse(localStorage.getItem('stats') || '{"total":0, "streak":0, "lastDate":""}');
            document.getElementById('streak').innerText = stats.streak;
            document.getElementById('totalTasks').innerText = stats.total;
            return stats;
        }

        function saveStat() {
            let stats = JSON.parse(localStorage.getItem('stats') || '{"total":0, "streak":0, "lastDate":""}');
            const today = new Date().toDateString();
            
            stats.total += 1;
            if (stats.lastDate !== today) {
                stats.streak += 1;
                stats.lastDate = today;
            }
            localStorage.setItem('stats', JSON.stringify(stats));
            updateStats();
        }

        async function generate(type) {
            const key = document.getElementById('apiKey').value.trim();
            const output = document.getElementById('output');
            const langCode = document.getElementById('langSelect').value;
            const langName = langs[langCode].name;

            if (!key) return alert("Syötä API-avain asetuksiin!");
            localStorage.setItem('user_api_key', key);

            output.innerHTML = `<div class="loading text-center mt-20 text-blue-600 font-bold">Tekoäly miettii harjoitusta...</div>`;
            document.getElementById('controls').classList.add('hidden');

            const prompt = `Act as a language tutor. Create a ${type} for a Finnish student learning ${langName}. 
            Structure:
            1. One English keyword for a picture related to the story (e.g. Keyword: Forest).
            2. A short Title in ${langName}.
            3. The main text/dialogue in ${langName}.
            4. Finnish translation.
            5. Vocabulary: 5 words (${langName} - Finnish).
            Use HTML tags like <h3> and <p> for formatting. Keep it simple and helpful.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [{ "role": "user", "content": prompt }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let content = data.choices[0].message.content;
                
                // Etsi kuva-avainsana
                const keywordMatch = content.match(/Keyword:\s*(\w+)/i);
                const keyword = keywordMatch ? keywordMatch[1] : 'learning';
                const cleanText = content.replace(/Keyword:.*?\n/i, '');
                const imageUrl = `https://images.unsplash.com/photo-1516259762381-22954d7d3ad2?auto=format&fit=crop&w=600&q=80`; // Dummy fallback
                const dynamicImg = `https://source.unsplash.com/600x400/?${keyword},${langName}`;

                output.innerHTML = `
                    <div class="comic-box mb-6 shadow-lg">
                        <img src="${dynamicImg}" class="w-full h-64 object-cover border-b-2 border-slate-800" onerror="this.src='https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=600'">
                    </div>
                    <div id="lessonText" class="prose max-w-none text-slate-800">
                        ${cleanText}
                    </div>
                `;
                
                document.getElementById('controls').classList.remove('hidden');
                saveStat();

            } catch (err) {
                output.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-xl"><b>Virhe:</b> ${err.message}</div>`;
            }
        }

        function speakText() {
            const text = document.getElementById('lessonText').innerText;
            const langCode = document.getElementById('langSelect').value;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langs[langCode].speech;
            utterance.rate = 0.8; // Hieman hitaampi puhe
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
