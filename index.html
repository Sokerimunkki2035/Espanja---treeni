<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kieli-AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .highlight { background-color: #fef08a; border-radius: 4px; color: black; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 font-sans flex flex-col h-screen overflow-hidden">

    <div class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center shadow-xl">
        <div>
            <h1 class="text-xl font-black text-yellow-500 italic uppercase tracking-tighter">🇪🇸 Aprendemos!</h1>
            <div class="text-[10px] font-mono text-slate-500">🔥 Putki: <span id="statStreak">0</span> | ✅ Valmis: <span id="statTotal">0</span></div>
        </div>
        <select id="targetLang" class="bg-slate-800 text-white p-2 rounded-xl text-xs border border-slate-700 outline-none">
            <option value="es">Espanja</option>
            <option value="ja">Japani</option>
            <option value="it">Italia</option>
        </select>
    </div>

    <div class="flex-grow flex flex-col lg:flex-row overflow-hidden">
        
        <div class="flex-grow flex flex-col p-4 overflow-y-auto custom-scroll border-r border-slate-900">
            <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col min-h-full">
                <div class="grid grid-cols-3 gap-1 p-2 bg-slate-100 border-b">
                    <button onclick="run('news')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-sm active:scale-95 transition-all text-sm">Uutiset</button>
                    <button onclick="run('comic')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-sm active:scale-95 transition-all text-sm">Sarjis</button>
                    <button onclick="run('dialogue')" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl shadow-sm active:scale-95 transition-all text-sm">Chat-treeni</button>
                </div>

                <div id="display" class="p-6 text-slate-900 flex-grow">
                    <div class="text-center py-20 text-slate-300">
                        <p class="text-7xl mb-4">📖</p>
                        <p class="font-bold italic text-slate-400">Paina nappia aloittaaksesi.</p>
                    </div>
                </div>

                <div id="audioBox" class="hidden p-6 bg-slate-50 border-t flex flex-col gap-4">
                    <div class="flex gap-2">
                        <button onclick="speak()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 shadow-lg">🔊 KUUNTELE</button>
                        <button id="micBtn" onclick="startSpeech()" class="flex-1 bg-red-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 shadow-lg">🎤 LUE ÄÄNEEN</button>
                    </div>
                    <p id="speechStatus" class="text-[10px] text-center font-bold text-slate-400 uppercase tracking-widest">Paina mikrofonía ja lue teksti</p>
                </div>
            </div>
        </div>

        <div class="lg:w-96 bg-slate-900/50 p-4 flex flex-col gap-4 overflow-y-auto custom-scroll">
            
            <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800 shadow-xl">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">🔍 Resurssihaku</h2>
                <div id="resourceBox" class="space-y-3 text-xs text-slate-400 italic">
                    Paina uutista tai sarjista hakeaksesi linkkejä...
                </div>
            </div>

            <div class="bg-black rounded-3xl p-4 border border-slate-800 flex flex-col h-80 shadow-inner">
                <div id="chatHistory" class="flex-grow overflow-y-auto text-[11px] text-slate-400 space-y-3 mb-3 custom-scroll">
                    <p><b>AI:</b> Hei! Voin etsiä linkkejä tai auttaa kääntämisessä.</p>
                </div>
                <div class="flex gap-2 bg-slate-900 p-1 rounded-2xl border border-slate-800">
                    <input id="chatInput" type="text" placeholder="Kysy AI:lta..." class="flex-grow bg-transparent text-white text-xs p-2 outline-none">
                    <button onclick="chatSearch()" class="bg-yellow-500 text-black font-bold px-4 py-2 rounded-xl text-xs hover:bg-yellow-400 transition-colors">➜</button>
                </div>
            </div>

            <details class="mt-auto opacity-50 hover:opacity-100 transition-opacity">
                <summary class="text-[9px] text-slate-600 cursor-pointer uppercase font-bold text-center">API-Asetukset</summary>
                <input type="password" id="apiInput" placeholder="Syötä avain tästä..." class="w-full bg-black mt-2 p-3 rounded-xl text-xs text-white border border-slate-800 outline-none">
            </details>
        </div>
    </div>

    <script>
        const langs = { es: { v: 'es-ES', n: 'Spanish' }, ja: { v: 'ja-JP', n: 'Japanese' }, it: { v: 'it-IT', n: 'Italian' } };
        document.getElementById('apiInput').value = localStorage.getItem('user_key_v5') || '';
        refreshStats();

        function refreshStats() {
            const s = JSON.parse(localStorage.getItem('user_stats_v5') || '{"total":0,"streak":0,"last":""}');
            document.getElementById('statTotal').innerText = s.total;
            document.getElementById('statStreak').innerText = s.streak;
        }

        async function run(type) {
            const key = document.getElementById('apiInput').value.trim();
            if (!key) return alert("API-avain puuttuu!");
            localStorage.setItem('user_key_v5', key);
            
            const lang = document.getElementById('targetLang').value;
            const display = document.getElementById('display');
            display.innerHTML = `<div class="loading text-center py-20 text-slate-400 font-bold italic">LUODAAN SISÄLTÖÄ...</div>`;
            document.getElementById('audioBox').classList.add('hidden');

            const prompt = `Task: Create a ${type} for a student learning ${langs[lang].n}. 
            Format exactly (no markdown):
            IMAGE: [one english noun]
            TITLE: [title]
            ES: [story in ${langs[lang].n}]
            FI: [translation]
            VOC: [3 words - Finnish]`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key.replace(/[^a-zA-Z0-9-]/g, '') },
                    body: JSON.stringify({ "model": "google/gemini-2.0-flash-001", "messages": [{ "role": "user", "content": prompt }] })
                });
                const data = await response.json();
                const raw = data.choices[0].message.content;

                const getVal = (tag) => {
                    const match = raw.match(new RegExp(`${tag}:(.*?)(?=\n[A-Z]{2,}:|$)`, 's'));
                    return match ? match[1].trim() : '';
                };

                const imgWord = getVal('IMAGE').replace(/[\[\]]/g, '') || 'culture';
                const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(imgWord)}?width=800&height=400&nologo=true&seed=${Math.random()}`;

                // TÄRKEÄÄ: Päivitetään vain 'display' laatikko
                display.innerHTML = `
                    <img src="${imgUrl}" class="w-full h-48 object-cover rounded-3xl mb-6 shadow-lg border-2 border-slate-50">
                    <h2 class="text-2xl font-black text-slate-900 mb-4 leading-tight">${getVal('TITLE')}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div id="mainText" class="p-5 bg-yellow-50 rounded-2xl border-l-8 border-yellow-400 italic text-slate-800 text-lg shadow-inner">${getVal('ES').replace(/\n/g, '<br>')}</div>
                        <div class="p-5 bg-slate-50 rounded-2xl border-l-8 border-slate-200 text-slate-600 text-sm leading-relaxed">${getVal('FI').replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="bg-slate-100 p-4 rounded-xl border border-slate-200 text-[11px] font-mono text-slate-500 uppercase flex flex-wrap gap-3 italic">
                        <b>Sanasto:</b> ${getVal('VOC').replace(/\n/g, ' | ')}
                    </div>
                `;
                document.getElementById('audioBox').classList.remove('hidden');
                updateStats();

                // Kutsutaan resurssit itsenäisesti
                fetchResources(getVal('TITLE'), key);

            } catch (err) { display.innerHTML = `<div class="p-6 text-red-500 font-bold">Virhe API-yhteydessä.</div>`; }
        }

        async function fetchResources(topic, key) {
            const resBox = document.getElementById('resourceBox');
            resBox.innerHTML = '<div class="loading">Etsitään linkkejä aiheeseen: ' + topic + '...</div>';
            
            const prompt = `Etsi 3 linkkiä (Amazon, YouTube, Webtoon tms.) joista löytyy espanjan sarjakuvia aiheesta: ${topic}. Vastaa lyhyesti listana.`;
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key.replace(/[^a-zA-Z0-9-]/g, '') },
                    body: JSON.stringify({ "model": "google/gemini-2.0-flash-001", "messages": [{ "role": "user", "content": prompt }] })
                });
                const data = await response.json();
                resBox.innerHTML = data.choices[0].message.content.split('\n').map(i => `<div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-800 text-slate-300 text-[11px] mb-2">🔗 ${i}</div>`).join('');
            } catch (e) { resBox.innerHTML = 'Linkkejä ei voitu ladata juuri nyt.'; }
        }

        function speak() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(document.getElementById('mainText').innerText);
            u.lang = langs[document.getElementById('targetLang').value].v;
            u.rate = 0.7;
            u.onstart = () => document.getElementById('mainText').classList.add('highlight');
            u.onend = () => document.getElementById('mainText').classList.remove('highlight');
            window.speechSynthesis.speak(u);
        }

        function startSpeech() {
            const status = document.getElementById('speechStatus');
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = langs[document.getElementById('targetLang').value].v;
            recognition.start();
            status.innerText = "🔴 KUUNTELEN...";
            recognition.onresult = (e) => {
                const spoken = e.results[0][0].transcript;
                status.innerHTML = `Sanoit: <span class="text-blue-500">"${spoken}"</span><br><span class="text-yellow-600 font-black">AI: ERINOMAINEN ÄÄNTÄMINEN!</span>`;
            };
        }

        function updateStats() {
            let s = JSON.parse(localStorage.getItem('user_stats_v5') || '{"total":0,"streak":0,"last":""}');
            const today = new Date().toDateString();
            s.total++;
            if (s.last !== today) { s.streak++; s.last = today; }
            localStorage.setItem('user_stats_v5', JSON.stringify(s));
            refreshStats();
        }

        async function chatSearch() {
            const inp = document.getElementById('chatInput');
            const history = document.getElementById('chatHistory');
            const key = document.getElementById('apiInput').value.trim();
            if(!inp.value || !key) return;
            
            const userMsg = inp.value;
            history.innerHTML += `<div class="bg-slate-800 p-2 rounded-xl text-white self-end"><b>Sinä:</b> ${userMsg}</div>`;
            inp.value = '';
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key.replace(/[^a-zA-Z0-9-]/g, '') },
                    body: JSON.stringify({ "model": "google/gemini-2.0-flash-001", "messages": [{ "role": "user", "content": userMsg }] })
                });
                const data = await response.json();
                history.innerHTML += `<div class="bg-slate-900 p-2 rounded-xl"><b>AI:</b> ${data.choices[0].message.content}</div>`;
                history.scrollTop = history.scrollHeight;
            } catch (e) { history.innerHTML += `<div class="text-red-500 italic">Virhe yhteydessä.</div>`; }
        }
    </script>
</body>
</html>
